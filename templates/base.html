<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Women's Health Survey{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Women's Health & Wellness Survey</h1>
            <p>Your voice matters. Help us build a better wellness app.</p>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 Women's Health Survey. All responses are confidential.</p>
        </div>
    </footer>
</body>
</html>
